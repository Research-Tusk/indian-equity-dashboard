                    <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={tickInterval} stroke={C.grid} />
                    <YAxis domain={peDomain} ticks={peTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v + 'x'} />
                    <Tooltip content={<Tip fields={[
                      { key: 'pe', label: 'P/E', color: C.cyan, suffix: 'x' },
                      { key: 'peMean', label: 'Mean', color: C.purple, suffix: 'x' },
                    ]} />} />
                    <ReferenceLine y={filteredStats.pe.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + fmt2(filteredStats.pe.sd2Upper) + ')', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                    <ReferenceLine y={filteredStats.pe.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + fmt2(filteredStats.pe.sd1Upper) + ')', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={filteredStats.pe.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + fmt2(filteredStats.pe.mean) + ')', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                    <ReferenceLine y={filteredStats.pe.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + fmt2(filteredStats.pe.sd1Lower) + ')', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={filteredStats.pe.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + fmt2(filteredStats.pe.sd2Lower) + ')', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                    <Line type="monotone" dataKey="pe" stroke={C.cyan} strokeWidth={2} dot={false} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
                <ZoneLegend stats={filteredStats.pe} suffix="x" />
              </ChartCard>

            {/* P/B */}
            <ChartCard
              title={indexConfig.label + " Price-to-Book Ratio"}
              subtitle={"With 1\u03C3 and 2\u03C3 standard deviation bands"}
              badge={current.pb + 'x'} badgeColor={C.blue} badgeBg="rgba(59,130,246,0.15)"
            >
              <ResponsiveContainer width="100%" height={400}>
                <ComposedChart key={'pb-'+period+'-'+activeIndex} data={chartData} margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.grid} />
                  <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={tickInterval} stroke={C.grid} />
                  <YAxis domain={pbDomain} ticks={pbTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v + 'x'} />
                  <Tooltip content={<Tip fields={[
                    { key: 'pb', label: 'P/B', color: C.blue, suffix: 'x' },
                    { key: 'pbMean', label: 'Mean', color: C.purple, suffix: 'x' },
                  ]} />} />
                  <ReferenceLine y={filteredStats.pb.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + fmt2(filteredStats.pb.sd2Upper) + ')', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                  <ReferenceLine y={filteredStats.pb.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + fmt2(filteredStats.pb.sd1Upper) + ')', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                  <ReferenceLine y={filteredStats.pb.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + fmt2(filteredStats.pb.mean) + ')', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                  <ReferenceLine y={filteredStats.pb.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + fmt2(filteredStats.pb.sd1Lower) + ')', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                  <ReferenceLine y={filteredStats.pb.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + fmt2(filteredStats.pb.sd2Lower) + ')', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                  <Line type="monotone" dataKey="pb" stroke={C.blue} strokeWidth={2} dot={false} isAnimationActive={false} />
                </ComposedChart>
              </ResponsiveContainer>
              <ZoneLegend stats={filteredStats.pb} suffix="x" />
            </ChartCard>
          </div>

          {/* RSI + FII side-by-side (Nifty 50: FII chart; others: RSI full-width) */}
          <div className="charts-grid" style={{ marginTop: 24 }}>
            <RSIModule data={data} activeIndex={activeIndex} period={period} customStartISO={customStartISO} />
            {taaConfig && erpChartData.length > 0 && (
              <ChartCard title={taaConfig.fiiLabel} subtitle={isSignalMocked(erpChartData.map(d => d.fii)) ? "Awaiting live data feed" : "With 1\u03C3 and 2\u03C3 bands"}
                badge={isSignalMocked(erpChartData.map(d => d.fii)) ? 'PENDING' : (erpChartData.length > 0 && erpChartData[erpChartData.length-1].fii != null ? erpChartData[erpChartData.length-1].fii.toFixed(1) + '%' : 'N/A')}
                badgeColor={isSignalMocked(erpChartData.map(d => d.fii)) ? C.amber : C.green} badgeBg={isSignalMocked(erpChartData.map(d => d.fii)) ? "rgba(245,158,11,0.15)" : "rgba(34,197,94,0.15)"}>
                {isSignalMocked(erpChartData.map(d => d.fii)) ? (
                  <PendingOverlay label="Awaiting API Integration" />
                ) : (
                <ResponsiveContainer width="100%" height={400}>
                  <ComposedChart data={erpChartData} margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.grid} />
                    <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={Math.max(1, Math.floor(erpChartData.length / 8))} stroke={C.grid} />
                    <YAxis domain={fiiDomain} ticks={fiiTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v + '%'} />
                    <Tooltip content={<Tip fields={[{ key: 'fii', label: taaConfig ? taaConfig.fiiLabel.split(' ').slice(0, 3).join(' ') : 'Positioning', color: C.green, suffix: '%' }]} />} />
                    <ReferenceLine y={fiiStats.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + fmt2(fiiStats.sd2Upper) + ')', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                    <ReferenceLine y={fiiStats.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + fmt2(fiiStats.sd1Upper) + ')', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={fiiStats.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + fmt2(fiiStats.mean) + ')', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                    <ReferenceLine y={fiiStats.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + fmt2(fiiStats.sd1Lower) + ')', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={fiiStats.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + fmt2(fiiStats.sd2Lower) + ')', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                    <Line type="monotone" dataKey="fii" stroke={C.green} strokeWidth={2} dot={false} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
                )}
                <div style={{ fontSize: 12, color: C.textMut, marginTop: 8, lineHeight: 1.5 }}>{taaConfig.fiiExplainer}</div>
              </ChartCard>
            )}
          </div>

          {/* Breadth + MCap/GDP side-by-side (TAA-enabled indices, Row 2 below RSI/FII) */}
          {taaConfig && breadthMcapChartData.length > 0 && (
            <div className="charts-grid" style={{ marginTop: 24 }}>
              <ChartCard title={'Market Breadth (% of ' + (taaConfig ? taaConfig.breadthUniverse : 'Index') + ' > 200 DMA)'} subtitle={isSignalMocked(breadthMcapChartData.map(d => d.breadth)) ? "Awaiting live data feed" : "With 1\u03C3 and 2\u03C3 bands"}
                badge={isSignalMocked(breadthMcapChartData.map(d => d.breadth)) ? 'PENDING' : (breadthMcapChartData.length > 0 && breadthMcapChartData[breadthMcapChartData.length-1].breadth != null ? breadthMcapChartData[breadthMcapChartData.length-1].breadth.toFixed(1) + '%' : 'N/A')}
                badgeColor={isSignalMocked(breadthMcapChartData.map(d => d.breadth)) ? C.amber : C.blue} badgeBg={isSignalMocked(breadthMcapChartData.map(d => d.breadth)) ? "rgba(245,158,11,0.15)" : "rgba(59,130,246,0.15)"}>
                {isSignalMocked(breadthMcapChartData.map(d => d.breadth)) ? (
                  <PendingOverlay label="Awaiting API Integration" />
                ) : (
                <ResponsiveContainer width="100%" height={400}>
                  <ComposedChart data={breadthMcapChartData} margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.grid} />
                    <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={bmTickInterval} stroke={C.grid} />
                    <YAxis domain={breadthDomain} ticks={breadthTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v + '%'} />
                    <Tooltip content={<Tip fields={[{ key: 'breadth', label: 'Breadth', color: C.blue, suffix: '%' }]} />} />
                    <ReferenceLine y={breadthStats.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + breadthStats.sd2Upper.toFixed(1) + ')', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                    <ReferenceLine y={breadthStats.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + breadthStats.sd1Upper.toFixed(1) + ')', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={breadthStats.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + breadthStats.mean.toFixed(1) + ')', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                    <ReferenceLine y={breadthStats.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + breadthStats.sd1Lower.toFixed(1) + ')', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={breadthStats.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + breadthStats.sd2Lower.toFixed(1) + ')', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                    <Line type="monotone" dataKey="breadth" stroke={C.blue} strokeWidth={2} dot={false} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
                )}
                <div style={{ fontSize: 12, color: C.textMut, marginTop: 8, lineHeight: 1.5 }}>{taaConfig ? taaConfig.breadthExplainer : ''}</div>
              </ChartCard>

              <ChartCard title="Market Cap to GDP (%)" subtitle={"With 1\u03C3 and 2\u03C3 bands"}
                badge={breadthMcapChartData.length > 0 && breadthMcapChartData[breadthMcapChartData.length-1].mcap != null ? breadthMcapChartData[breadthMcapChartData.length-1].mcap.toFixed(0) + '%' : 'N/A'}
                badgeColor={C.amber} badgeBg="rgba(245,158,11,0.15)">
                <ResponsiveContainer width="100%" height={400}>
                  <ComposedChart data={breadthMcapChartData} margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.grid} />
                    <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={bmTickInterval} stroke={C.grid} />
                    <YAxis domain={mcapDomain} ticks={mcapTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v + '%'} />
                    <Tooltip content={<Tip fields={[{ key: 'mcap', label: 'MCap/GDP', color: C.amber, suffix: '%' }]} />} />
                    <ReferenceLine y={mcapStats.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + mcapStats.sd2Upper.toFixed(0) + '%)', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                    <ReferenceLine y={mcapStats.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + mcapStats.sd1Upper.toFixed(0) + '%)', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={mcapStats.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + mcapStats.mean.toFixed(0) + '%)', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                    <ReferenceLine y={mcapStats.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + mcapStats.sd1Lower.toFixed(0) + '%)', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={mcapStats.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + mcapStats.sd2Lower.toFixed(0) + '%)', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                    <Line type="monotone" dataKey="mcap" stroke={C.amber} strokeWidth={2} dot={false} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
                <div style={{ fontSize: 12, color: C.textMut, marginTop: 8, lineHeight: 1.5 }}>{taaConfig ? taaConfig.mcapGdpExplainer : ''}</div>
              </ChartCard>
            </div>
          )}

          {/* TAA Module (TAA-enabled indices) */}
          {taaConfig && <TAAModule data={data} taaConfig={taaConfig} />}

          {/* Relative Valuation Ratio Charts (Capital Markets only) */}
          {activeIndex === 'nifty-capital-markets' && ratioChartData.length > 0 && (
            <div className="charts-grid" style={{ marginTop: 24 }}>
              <ChartCard
                title="Capital Markets P/E &#247; Nifty 50 P/E"
                subtitle={"Relative P/E valuation ratio with 1\u03C3 and 2\u03C3 bands"}
                badge={filteredRatio.length > 0 ? filteredRatio[filteredRatio.length - 1].peRatio.toFixed(2) + 'x' : 'N/A'}
                badgeColor={C.cyan} badgeBg="rgba(34,211,238,0.15)"
              >
                <ResponsiveContainer width="100%" height={400}>
                  <ComposedChart key={'peRatio-'+period} data={ratioChartData} margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.grid} />
                    <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={ratioTickInterval} stroke={C.grid} />
                    <YAxis domain={peRatioDomain} ticks={peRatioTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v.toFixed(2) + 'x'} />
                    <Tooltip content={<Tip fields={[
                      { key: 'peRatio', label: 'P/E Ratio', color: C.cyan, suffix: 'x' },
                      { key: 'peRatioMean', label: 'Mean', color: C.purple, suffix: 'x' },
                    ]} />} />
                    <ReferenceLine y={ratioStats.pe.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + fmt2(ratioStats.pe.sd2Upper) + ')', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pe.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + fmt2(ratioStats.pe.sd1Upper) + ')', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pe.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + fmt2(ratioStats.pe.mean) + ')', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pe.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + fmt2(ratioStats.pe.sd1Lower) + ')', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pe.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + fmt2(ratioStats.pe.sd2Lower) + ')', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                    <Line type="monotone" dataKey="peRatio" stroke={C.cyan} strokeWidth={2} dot={false} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
                <ZoneLegend stats={ratioStats.pe} suffix="x" />
              </ChartCard>

              <ChartCard
                title="Capital Markets P/B &#247; Nifty 50 P/B"
                subtitle={"Relative P/B valuation ratio with 1\u03C3 and 2\u03C3 bands"}
                badge={filteredRatio.length > 0 ? filteredRatio[filteredRatio.length - 1].pbRatio.toFixed(2) + 'x' : 'N/A'}
                badgeColor={C.blue} badgeBg="rgba(59,130,246,0.15)"
              >
                <ResponsiveContainer width="100%" height={400}>
                  <ComposedChart key={'pbRatio-'+period} data={ratioChartData} margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke={C.grid} />
                    <XAxis dataKey="date" tickFormatter={fmtDate} tick={{ fontSize: 11, fill: C.textMut }} interval={ratioTickInterval} stroke={C.grid} />
                    <YAxis domain={pbRatioDomain} ticks={pbRatioTicks} tick={{ fontSize: 11, fill: C.textMut }} stroke={C.grid} tickFormatter={v => v.toFixed(2) + 'x'} />
                    <Tooltip content={<Tip fields={[
                      { key: 'pbRatio', label: 'P/B Ratio', color: C.blue, suffix: 'x' },
                      { key: 'pbRatioMean', label: 'Mean', color: C.purple, suffix: 'x' },
                    ]} />} />
                    <ReferenceLine y={ratioStats.pb.sd2Upper} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+2\u03C3 (' + fmt2(ratioStats.pb.sd2Upper) + ')', position: 'insideTopRight', fill: C.red, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pb.sd1Upper} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '+1\u03C3 (' + fmt2(ratioStats.pb.sd1Upper) + ')', position: 'insideTopRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pb.mean} stroke={C.purple} strokeWidth={1.5} strokeDasharray="6 4" label={{ value: 'Mean (' + fmt2(ratioStats.pb.mean) + ')', position: 'insideTopRight', fill: C.purple, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pb.sd1Lower} stroke={C.amber} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22121\u03C3 (' + fmt2(ratioStats.pb.sd1Lower) + ')', position: 'insideBottomRight', fill: C.amber, fontSize: 10 }} />
                    <ReferenceLine y={ratioStats.pb.sd2Lower} stroke={C.red} strokeWidth={1} strokeDasharray="4 4" label={{ value: '\u22122\u03C3 (' + fmt2(ratioStats.pb.sd2Lower) + ')', position: 'insideBottomRight', fill: C.red, fontSize: 10 }} />
                    <Line type="monotone" dataKey="pbRatio" stroke={C.blue} strokeWidth={2} dot={false} isAnimationActive={false} />
                  </ComposedChart>
                </ResponsiveContainer>
                <ZoneLegend stats={ratioStats.pb} suffix="x" />
              </ChartCard>
            </div>
          )}

          {/* Footer */}
          <div style={{ textAlign: 'center', padding: '24px 0', fontSize: 12, color: C.textMut, borderTop: '1px solid ' + C.border, marginTop: 32 }}>
            Data sourced from NSE India (PE/PB) &amp; Investing.com (10Y G-Sec Yield) &bull; {indexConfig.label} from {dataStartLabel} &bull; {data.length.toLocaleString()} trading days
            <br /><span style={{ opacity: 0.7 }}>Tusk Invest Research</span>
          </div>
        </div>
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Dashboard />);
  </script>
</body>
</html>

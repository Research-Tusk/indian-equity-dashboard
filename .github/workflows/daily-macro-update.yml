# Phase-5: Web-native daily refresh for ALL tickers, sectors, global indices, and macro proxies.
# This file replaces the prior workflow that only refreshed Nifty 50, Capital Markets, S&P 500, NASDAQ.
# Path in repo: .github/workflows/daily-macro-update.yml
#
# What changed vs. v47:
#   - Single `update-all` call (now SEQUENTIAL with 350ms gap inside the Edge Function v48)
#   - india-macro proxies are warmed up daily via a dedicated curl step
#   - macro-history (DXY/USDJPY/yieldCurve) and gdp-factors warmed too
# All work is performed by the deployed Edge Function. The web app pulls fresh data
# autonomously — no dependency on local Cowork/desktop environments.

name: Daily Macro Update (Phase-5)

on:
  schedule:
    # Twice daily: 7:00 AM IST (01:30 UTC) and 7:00 PM IST (13:30 UTC) — every day of the week.
    - cron: '30 1,13 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh ALL indices (sequential, 350ms gap, NSE-cookie-primed)
        run: |
          curl -sS --fail-with-body --max-time 300 \
            "https://urmzsefnlyfnalxckefm.supabase.co/functions/v1/nse-data-proxy?mode=update-all" \
            | head -c 4000
          echo
      - name: Warm india-macro proxies (FRED + Yahoo)
        run: |
          curl -sS --fail-with-body \
            "https://urmzsefnlyfnalxckefm.supabase.co/functions/v1/nse-data-proxy?mode=india-macro" \
            | head -c 600
          echo
      - name: Warm macro-history (DXY / USDJPY / yieldCurve)
        run: |
          curl -sS --fail-with-body \
            "https://urmzsefnlyfnalxckefm.supabase.co/functions/v1/nse-data-proxy?mode=macro-history" \
            > /dev/null
          echo "macro-history warmed"
      - name: Warm gdp-factors (legacy ribbon)
        run: |
          curl -sS --fail-with-body \
            "https://urmzsefnlyfnalxckefm.supabase.co/functions/v1/nse-data-proxy?mode=gdp-factors" \
            > /dev/null
          echo "gdp-factors warmed"
      - name: Refresh active stocks universe
        run: |
          curl -sS --fail-with-body --max-time 300 \
            "https://urmzsefnlyfnalxckefm.supabase.co/functions/v1/nse-data-proxy?mode=stocks-update-all" \
            | head -c 600
          echo
      - name: Health probe
        run: |
          curl -sS --fail-with-body \
            "https://urmzsefnlyfnalxckefm.supabase.co/functions/v1/nse-data-proxy?mode=health" \
            | head -c 1500
          echo

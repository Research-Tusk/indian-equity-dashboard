name: Daily US Market Data Update

on:
  schedule:
    # Run at 01:00 UTC (9 PM ET) — after US market close
    - cron: '0 1 * * 2-6'
  workflow_dispatch:

jobs:
  update-us-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Refresh S&P 500 data
        run: |
          echo "Triggering S&P 500 data refresh..."
          RESPONSE=$(curl -sf --max-time 120 \
            "https://deydvhkxfhdzyttptnee.supabase.co/functions/v1/nse-data-proxy?mode=update-data&index=sp500")
          echo "$RESPONSE" | jq .
          MERGED=$(echo "$RESPONSE" | jq -r '.merged // 0')
          echo "S&P 500: $MERGED rows merged"

      - name: Refresh NASDAQ data
        run: |
          echo "Triggering NASDAQ data refresh..."
          RESPONSE=$(curl -sf --max-time 120 \
            "https://deydvhkxfhdzyttptnee.supabase.co/functions/v1/nse-data-proxy?mode=update-data&index=nasdaq")
          echo "$RESPONSE" | jq .
          MERGED=$(echo "$RESPONSE" | jq -r '.merged // 0')
          echo "NASDAQ: $MERGED rows merged"

      - name: Health check
        run: |
          echo "Running health check..."
          curl -sf --max-time 30 \
            "https://deydvhkxfhdzyttptnee.supabase.co/functions/v1/nse-data-proxy?mode=health" | jq '.indices.sp500, .indices.nasdaq'
